<h2>配色方向</h2>
<p class="subtitle">基于 B 风格（圆形 W 徽标 + 文字），选择你倾向的配色。</p>

<div class="cards">

        <div>
          <div style="font-size:16px;font-weight:700;color:#1e293b;font-family:'Inter',sans-serif;">Open<span style="color:#1e40af;font-weight:900;">WES</span></div>
          <div style="width:100%;height:2px;background:linear-gradient(90deg,#1e40af,#60a5fa 60%,transparent);border-radius:2px;margin-top:3px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A · 深海军蓝</h3>
