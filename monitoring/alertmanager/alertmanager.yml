global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 5m
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 10m
    - match:
        severity: warning
      receiver: "warning"
    - match:
        severity: info
      receiver: "info"

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

  - name: "warning"
    webhook_configs:
      - url: "http://localhost:5001/webhook"
        send_resolved: true

  - name: "info"
    # Info alerts are annotation-only in Grafana, no notification

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
