name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Compile JARs in the runner (reliable Maven Central access + Gradle cache).
      # The Dockerfile is a runtime-only image that COPYs these pre-built JARs.
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JARs
        run: |
          cd server
          ./gradlew :server:station-server:bootJar \
                    :server:gateway-server:bootJar \
                    :server:wes-server:bootJar \
                    -x test --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # All 3 images share the same tiny eclipse-temurin runtime layer,
      # so Docker layer cache is reused across all 3 pushes.
      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:latest
            ghcr.io/${{ github.repository }}/gateway:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push wes-server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: wes
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/wes:latest
            ghcr.io/${{ github.repository }}/wes:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push station-server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: station
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/station:latest
            ghcr.io/${{ github.repository }}/station:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy to Remote Server
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_REPO,IMAGE_TAG
          script: |
            set -e

            # Authenticate with GHCR so the server can pull private images
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            # Navigate to the deploy directory (repo must be cloned here on first run)
            cd /opt/open-wes

            # Pull the latest compose config and initdb scripts
            git pull origin master

            # Write the .env file that docker-compose.prod.yml reads
            HOST_IP=$(hostname -I | awk '{print $1}')
            cat > .env << EOF
            HOST_IP=${HOST_IP}
            IMAGE_BASE=ghcr.io/${GITHUB_REPO}
            IMAGE_TAG=${IMAGE_TAG}
            EOF

            # Pull new images then recreate only changed containers
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to reclaim disk space
            docker image prune -f
