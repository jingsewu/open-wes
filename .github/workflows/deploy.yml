name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Compile JARs in the runner (reliable Maven Central access + Gradle cache).
      # The Dockerfile is a runtime-only image that COPYs these pre-built JARs.
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JARs
        run: |
          cd server
          ./gradlew :server:station-server:bootJar \
                    :server:gateway-server:bootJar \
                    :server:wes-server:bootJar \
                    -x test --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # All 3 images share the same tiny eclipse-temurin runtime layer,
      # so Docker layer cache is reused across all 3 pushes.
      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:latest
            ghcr.io/${{ github.repository }}/gateway:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push wes-server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: wes
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/wes:latest
            ghcr.io/${{ github.repository }}/wes:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push station-server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: station
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/station:latest
            ghcr.io/${{ github.repository }}/station:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy:
    name: Deploy to Remote Server
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_REPO,IMAGE_TAG
          script: |
            set -e

            # Authenticate with GHCR.
            # Write credentials directly to ~/.docker/config.json to avoid
            # "Cannot perform an interactive login from a non TTY device" errors
            # that occur when Docker on the server uses a credential store.
            mkdir -p ~/.docker
            AUTH=$(printf '%s:%s' "${GITHUB_ACTOR}" "${GHCR_TOKEN}" | base64 -w 0)
            printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${AUTH}" > ~/.docker/config.json

            # First-time setup: clone the repo; otherwise just pull latest
            if [ -d /data/workspace/open-wes ]; then
              git -C /data/workspace/open-wes pull origin master
            else
              sudo git clone https://github.com/jingsewu/open-wes.git /data/workspace/open-wes
              sudo chown -R "$(whoami)" /data/workspace/open-wes
            fi

            cd /data/workspace/open-wes

            # Write the .env file that docker-compose.prod.yml reads.
            # Use printf to avoid heredoc indentation issues.
            HOST_IP=$(hostname -I | awk '{print $1}')
            printf 'HOST_IP=%s\nIMAGE_BASE=ghcr.io/%s\nIMAGE_TAG=%s\n' \
              "${HOST_IP}" "${GITHUB_REPO}" "${IMAGE_TAG}" > .env

            # Pull new images then recreate only changed containers.
            # Use 'docker compose' (v2) — docker-compose (v1) is not installed.
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to reclaim disk space
            sudo docker image prune -f
