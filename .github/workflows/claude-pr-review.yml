name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            Review this PR. Follow the standards in CLAUDE.md and server/Code Rule.md.
            Focus on: correctness, security, DDD patterns, naming conventions, test coverage.
            Be concise. Only flag real issues, not style nitpicks.
          claude_args: "--max-turns 10"
        env:
          OVERRIDE_GITHUB_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic/
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
